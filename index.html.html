  <script src="/_sdk/e063511df281944a.editing_sdk.js" integrity="sha512-Xa8p4aPfoMxVnzxQE2WAG0FfoaPLxdjOJMfUZGm1yZosJTYmnNDvgLkJ2EoN0i3zxjeQVAzUMSXNvTKQVqbXyQ=="></script>
  <script>
    // Guard: lucide may be blocked in some sandboxes — never crash the game.
    try { if (window.lucide) lucide.createIcons(); } catch (e) {}

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // ---- Pixel palette ----
    const C = {
      bearBody: '#a9744f', bearDark: '#7a4f30', bearFace: '#e8c9a0',
      snack: '#f3c14b', snackDark: '#c9962b',
      bugBody: '#6ab04c', bugDark: '#3d7027', bugLeg: '#1f3a15',
      star: '#ffe14d', starDark: '#d4a71f',
      white: '#ffffff', black: '#1b1740'
    };

    function pxc(context, x, y, w, h, color) {
      context.fillStyle = color;
      context.fillRect(Math.round(x), Math.round(y), w, h);
    }
    function px(x, y, w, h, color) { pxc(ctx, x, y, w, h, color); }

    // ---- Drawing routines (pixel art) ----
    function drawBearOn(g, x, y) {
      pxc(g, x+6, y+2, 12, 12, C.bearBody);
      pxc(g, x+38, y+2, 12, 12, C.bearBody);
      pxc(g, x+9, y+5, 6, 6, C.bearDark);
      pxc(g, x+41, y+5, 6, 6, C.bearDark);
      pxc(g, x+4, y+10, 48, 30, C.bearBody);
      pxc(g, x+16, y+22, 24, 14, C.bearFace);
      pxc(g, x+16, y+16, 6, 6, C.black);
      pxc(g, x+34, y+16, 6, 6, C.black);
      pxc(g, x+25, y+26, 6, 5, C.bearDark);
      pxc(g, x+22, y+32, 12, 3, C.bearDark);
    }
    function drawSnackOn(g, x, y) {
      pxc(g, x+4, y, 16, 4, C.snack);
      pxc(g, x, y+4, 24, 12, C.snack);
      pxc(g, x+4, y+16, 16, 4, C.snack);
      pxc(g, x+6, y+5, 5, 5, C.white);
      pxc(g, x+13, y+11, 6, 3, C.snackDark);
    }
    function drawBugOn(g, x, y) {
      pxc(g, x+4, y+4, 16, 14, C.bugBody);
      pxc(g, x+7, y+7, 10, 8, C.bugDark);
      pxc(g, x, y+6, 4, 3, C.bugLeg);
      pxc(g, x+20, y+6, 4, 3, C.bugLeg);
      pxc(g, x, y+12, 4, 3, C.bugLeg);
      pxc(g, x+20, y+12, 4, 3, C.bugLeg);
      pxc(g, x+7, y, 3, 4, C.black);
      pxc(g, x+14, y, 3, 4, C.black);
    }
    function drawStarOn(g, x, y) {
      pxc(g, x+9, y, 4, 4, C.star);
      pxc(g, x+5, y+4, 12, 4, C.star);
      pxc(g, x, y+8, 22, 5, C.star);
      pxc(g, x+4, y+13, 6, 5, C.star);
      pxc(g, x+12, y+13, 6, 5, C.star);
      pxc(g, x+8, y+6, 4, 4, C.white);
      pxc(g, x+2, y+9, 3, 3, C.starDark);
      pxc(g, x+17, y+9, 3, 3, C.starDark);
    }

    function drawBear(x, y) { drawBearOn(ctx, x, y); }
    function drawSnack(x, y) { drawSnackOn(ctx, x, y); }
    function drawBug(x, y) { drawBugOn(ctx, x, y); }
    function drawStar(x, y) { drawStarOn(ctx, x, y); }

    // ---- Render mini guide previews on the start overlay ----
    function renderGuidePreviews() {
      document.querySelectorAll('.guide-canvas').forEach(cv => {
        const g = cv.getContext('2d');
        g.clearRect(0, 0, cv.width, cv.height);
        const kind = cv.dataset.guide;
        if (kind === 'snack') drawSnackOn(g, 0, 2);
        else if (kind === 'star') drawStarOn(g, 1, 3);
        else if (kind === 'bug') drawBugOn(g, 1, 3);
      });
    }
    renderGuidePreviews();

    // ---- Game state ----
    let state = 'idle'; // idle | playing | over
    const bear = { w: 56, h: 44, x: W/2 - 28, y: H - 56, speed: 5 };
    let items = [];
    let score = 0;
    let lives = 3;
    let doubleUntil = 0;
    let spawnTimer = 0;
    let rafId = null;
    let lastTime = 0;

    const keys = { left: false, right: false };

    function spawnItem() {
      const r = Math.random();
      let type;
      if (r < 0.16) type = 'star';
      else if (r < 0.5) type = 'bug';
      else type = 'snack';
      const size = 24;
      items.push({
        type,
        x: Math.floor(Math.random() * (W - size)),
        y: -size,
        w: size, h: size,
        speed: 1.4 + Math.random() * 1.6 + score * 0.004
      });
    }

    function updateScore() {
      document.getElementById('score-value').textContent = score;
    }
    function updateHearts() {
      document.querySelectorAll('#hearts-container .heart-slot').forEach(slot => {
        const n = parseInt(slot.dataset.heart, 10);
        if (n <= lives) slot.classList.remove('heart-lost');
        else slot.classList.add('heart-lost');
      });
    }
    const doubleBadge = document.getElementById('double-badge');
    function showDoubleBadge(on) {
      if (on) {
        doubleBadge.classList.remove('hidden');
        doubleBadge.classList.remove('badge-pop');
        void doubleBadge.offsetWidth;
        doubleBadge.classList.add('badge-pop');
      } else {
        doubleBadge.classList.add('hidden');
      }
    }

    function hits(it) {
      return it.x < bear.x + bear.w &&
             it.x + it.w > bear.x &&
             it.y < bear.y + bear.h &&
             it.y + it.h > bear.y;
    }

    function loop(t) {
      if (state !== 'playing') return;
      const dt = Math.min((t - lastTime) / 16.67, 3);
      lastTime = t;

      ctx.clearRect(0, 0, W, H);

      if (keys.left) bear.x -= bear.speed * dt;
      if (keys.right) bear.x += bear.speed * dt;
      bear.x = Math.max(0, Math.min(W - bear.w, bear.x));

      spawnTimer += dt;
      const spawnEvery = Math.max(28, 55 - score * 0.15);
      if (spawnTimer >= spawnEvery) { spawnTimer = 0; spawnItem(); }

      const dbl = t < doubleUntil;

      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        it.y += it.speed * dt;

        if (hits(it)) {
          if (it.type === 'snack') { score += dbl ? 20 : 10; updateScore(); }
          else if (it.type === 'star') { doubleUntil = t + 6000; showDoubleBadge(true); }
          else if (it.type === 'bug') {
            lives -= 1; updateHearts();
            if (lives <= 0) { endGame(); return; }
          }
          items.splice(i, 1);
          continue;
        }
        if (it.y > H) { items.splice(i, 1); continue; }

        if (it.type === 'snack') drawSnack(it.x, it.y);
        else if (it.type === 'bug') drawBug(it.x, it.y);
        else drawStar(it.x, it.y);
      }

      if (!dbl && !doubleBadge.classList.contains('hidden')) showDoubleBadge(false);

      drawBear(bear.x, bear.y);

      rafId = requestAnimationFrame(loop);
    }

    function resetState() {
      items = []; score = 0; lives = 3; doubleUntil = 0; spawnTimer = 0;
      bear.x = W/2 - bear.w/2;
      updateScore(); updateHearts(); showDoubleBadge(false);
    }

    function startGame() {
      resetState();
      document.getElementById('start-overlay').classList.add('hidden');
      document.getElementById('gameover-overlay').classList.add('hidden');
      state = 'playing';
      lastTime = performance.now();
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function endGame() {
      state = 'over';
      if (rafId) cancelAnimationFrame(rafId);
      document.getElementById('final-score').textContent = score;
      document.getElementById('gameover-overlay').classList.remove('hidden');
    }

    document.getElementById('start-button').addEventListener('click', startGame);
    document.getElementById('restart-button').addEventListener('click', startGame);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
      if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
    });
    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') keys.left = false;
      if (e.key === 'ArrowRight') keys.right = false;
    });

    function bindHold(id, dir) {
      const el = document.getElementById(id);
      const on = (e) => { e.preventDefault(); keys[dir] = true; };
      const off = () => { keys[dir] = false; };
      el.addEventListener('mousedown', on);
      el.addEventListener('touchstart', on, { passive: false });
      ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => el.addEventListener(ev, off));
    }
    bindHold('move-left-button', 'left');
    bindHold('move-right-button', 'right');

    // initial idle draw
    ctx.clearRect(0, 0, W, H);
    drawBear(bear.x, bear.y);
  </script>
